<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0b">
<title>Solo Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:#0a0a0b;color:#e4e4e7;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type="number"]{-moz-appearance:textfield}
.app{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;background:#0a0a0b;z-index:10}
.header-left,.header-right{width:40px}
.header-right{display:flex;justify-content:flex-end}
.header h1{font-size:17px;font-weight:700;letter-spacing:-0.02em;color:#fff}
.back-btn,.history-btn{background:none;border:none;cursor:pointer;padding:4px;display:flex}
.back-btn{color:#f97316}.history-btn{color:rgba(255,255,255,0.5)}
.content{padding:16px 20px 40px}
.stats-row{display:flex;gap:10px;margin-bottom:24px}
.stat-card{flex:1;background:rgba(255,255,255,0.04);border-radius:12px;padding:14px 12px;display:flex;flex-direction:column;align-items:center;border:1px solid rgba(255,255,255,0.06)}
.stat-value{font-size:24px;font-weight:700;color:#fff}
.stat-label{font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px;text-transform:uppercase;letter-spacing:0.05em}
.section{margin-top:24px}
.section-title{font-size:13px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px}
.last-card{background:rgba(255,255,255,0.04);border-radius:12px;padding:16px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.06);cursor:pointer}
.last-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.tbadge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;color:#fff;text-transform:uppercase;letter-spacing:0.04em}
.tbadge.lower{background:#9a3412}.tbadge.upper{background:#1e3a5f}
.last-date{font-size:12px;color:rgba(255,255,255,0.4)}
.mini-ex{font-size:13px;color:rgba(255,255,255,0.6);display:block;margin-top:4px}
.sc1{color:#22c55e}.sc2{color:#eab308}.sc3{color:#ef4444}
.pbtn{width:100%;padding:14px 20px;background:#f97316;color:#000;font-weight:700;font-size:15px;border:none;border-radius:12px;cursor:pointer;margin-top:8px}
.sbtn{width:100%;padding:12px 20px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);font-weight:600;font-size:14px;border:1px solid rgba(255,255,255,0.08);border-radius:12px;cursor:pointer}
.srow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.srow-l{display:flex;align-items:center;gap:12px;cursor:pointer;flex:1}
.tdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tdot.lower{background:#f97316}.tdot.upper{background:#3b82f6}
.srow-date{display:block;font-size:14px;font-weight:600;color:#fff}
.srow-type{display:block;font-size:12px;color:rgba(255,255,255,0.35)}
.srow-r{display:flex;align-items:center;gap:6px}
.mscore{font-size:13px;font-weight:700;width:20px;text-align:center}
.mscore-e{font-size:13px;color:rgba(255,255,255,0.15);width:20px;text-align:center}
.del-btn{background:none;border:none;color:rgba(255,255,255,0.15);cursor:pointer;padding:4px 4px 4px 8px;display:flex}
.cfw{display:flex;gap:6px;margin-left:8px}
.cfy{font-size:12px;padding:4px 10px;background:#ef4444;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600}
.cfn{font-size:12px;padding:4px 10px;background:rgba(255,255,255,0.1);color:#fff;border:none;border-radius:6px;cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:#18181b;border-radius:20px 20px 0 0;padding:28px 24px 36px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:20px}
.fg{margin-bottom:20px}
.fl{display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,0.4);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em}
.trow{display:flex;gap:10px}
.tbtn{flex:1;padding:12px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.tbtn.active{background:rgba(249,115,22,0.15);border-color:#f97316}
.tlbl{font-size:14px;font-weight:700;color:#fff}
.dinput{width:100%;padding:12px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:15px}
.slot-sec{margin-bottom:16px}
.slot-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.slot-pat{color:#f97316}
.exopt{padding:10px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;cursor:pointer;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;transition:background .15s,border-color .15s}
.exopt.sel{background:rgba(249,115,22,0.12);border-color:#f97316}
.exopt-n{font-size:14px;font-weight:600;color:#fff}
.exopt-d{font-size:11px;color:rgba(255,255,255,0.3)}
.exopt-chk{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center}
.exopt.sel .exopt-chk{border-color:#f97316;background:#f97316}
.shdr{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.tbadge-lg{font-size:12px;font-weight:700;padding:6px 14px;border-radius:8px;color:#fff;text-transform:uppercase;letter-spacing:0.04em}
.sdate{font-size:14px;color:rgba(255,255,255,0.5)}
.mrow{display:flex;gap:12px;margin-bottom:20px}
.mcard{flex:1;background:rgba(255,255,255,0.04);border-radius:12px;padding:14px;border:1px solid rgba(255,255,255,0.06)}
.mlbl{display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px}
.erow{display:flex;gap:6px}
.ebtn{width:36px;height:36px;border-radius:8px;border:none;cursor:pointer;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4)}
.ebtn.active{font-weight:700}
.durin{width:100%;padding:8px 0;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.15);color:#fff;font-size:22px;font-weight:700;text-align:center;outline:none}
.ecard{background:rgba(255,255,255,0.03);border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid rgba(255,255,255,0.06)}
.ehdr{margin-bottom:14px}
.ename{font-size:16px;font-weight:700;color:#fff}
.eslot{font-size:10px;font-weight:700;color:#f97316;text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;display:block}
.emeta{font-size:12px;color:rgba(255,255,255,0.3);margin-top:2px;display:block}
.wrow{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px}
.wbtn{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,0.08);border:none;color:#fff;font-size:20px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center}
.wdisp{display:flex;align-items:baseline;gap:4px;min-width:80px;justify-content:center}
.wval{font-size:28px;font-weight:800;color:#fff}
.wunit{font-size:14px;color:rgba(255,255,255,0.35)}
.wdelta{font-size:13px;font-weight:700;margin-left:4px}
.sets-row{display:flex;gap:12px;margin-bottom:14px;justify-content:center}
.set-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.set-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase}
.repin{width:52px;height:44px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:18px;font-weight:700;text-align:center;outline:none}
.repin.ph{color:rgba(255,255,255,0.25)}
.prev-r{font-size:10px;color:rgba(255,255,255,0.2)}
.scrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sclbl{font-size:12px;font-weight:600;color:rgba(255,255,255,0.3);min-width:40px}
.scbtns{display:flex;gap:8px;flex:1}
.scbtn{flex:1;padding:8px 6px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.35)}
.scbtn.s1.active{background:#052e16;border-color:#22c55e;color:#22c55e}
.scbtn.s2.active{background:#422006;border-color:#eab308;color:#eab308}
.scbtn.s3.active{background:#450a0a;border-color:#ef4444;color:#ef4444}
.scbtn-n{font-size:16px;font-weight:800}
.scbtn-l{font-size:10px;font-weight:600}
.varin{width:100%;padding:8px 10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:8px;color:rgba(255,255,255,0.5);font-size:13px;outline:none;margin-top:6px}
.nsec{margin-top:10px}
.nlbl{display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,0.35);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em}
.nin{width:100%;padding:12px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#e4e4e7;font-size:14px;outline:none;resize:vertical;min-height:80px;font-family:inherit}
.pcard{background:rgba(255,255,255,0.03);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.06)}
.phdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.pwk{font-size:14px;font-weight:800;color:#f97316}
.pdt{font-size:12px;color:rgba(255,255,255,0.35)}
.petag{font-size:11px;font-weight:700}
.pdtag{font-size:11px;font-weight:600;color:rgba(255,255,255,0.3)}
.pexs{display:flex;flex-direction:column;gap:8px}
.pexr{display:flex;flex-direction:column;gap:2px}
.pexn{font-size:13px;font-weight:600;color:rgba(255,255,255,0.6)}
.pexs-tag{font-size:10px;color:rgba(255,255,255,0.2);text-transform:uppercase}
.pexd{display:flex;gap:12px;align-items:center}
.pexw{font-size:14px;font-weight:700;color:#fff;min-width:60px}
.pexrp{font-size:13px;color:rgba(255,255,255,0.4);font-family:monospace}
.pexsc{font-size:12px;font-weight:700}
.pexv{font-size:11px;color:rgba(255,255,255,0.25);font-style:italic}
.pnotes{font-size:12px;color:rgba(255,255,255,0.3);margin-top:10px;font-style:italic}
.pdelta{font-size:11px;margin-left:4px}
.empty{text-align:center;padding:40px 20px}
.empty p{color:rgba(255,255,255,0.3);font-size:14px}
.ver{text-align:center;padding:20px;font-size:11px;color:rgba(255,255,255,0.15)}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const V="1.1",SK="solo-workout-data-v2";
const DBW=[];for(let w=4;w<=40;w+=1.5)DBW.push(Math.round(w*10)/10);
const LIB={lower:{squat:{pattern:"Squat",exercises:[
{id:"goblet_squat",name:"Goblet Squat",dw:25,sets:3,tr:10,rest:90,hw:true,unit:"kg"},
{id:"db_front_squat",name:"DB Front Squat",dw:20,sets:3,tr:10,rest:90,hw:true,unit:"kg (each)"},
{id:"db_split_squat",name:"DB Split Squat",dw:14.5,sets:3,tr:10,rest:90,hw:true,unit:"kg (each)"},
{id:"db_bulgarian",name:"DB Bulgarian Split Squat",dw:13,sets:3,tr:8,rest:90,hw:true,unit:"kg (each)"},
{id:"db_lunge",name:"DB Lunge",dw:14.5,sets:3,tr:10,rest:90,hw:true,unit:"kg (each)"},
{id:"db_reverse_lunge",name:"DB Reverse Lunge",dw:14.5,sets:3,tr:10,rest:90,hw:true,unit:"kg (each)"},
{id:"db_step_up",name:"DB Step-Up",dw:13,sets:3,tr:10,rest:90,hw:true,unit:"kg (each)"}]},
hinge:{pattern:"Hinge",exercises:[
{id:"db_rdl",name:"DB Romanian Deadlift",dw:20.5,sets:3,tr:10,rest:90,hw:true,unit:"kg (each)"},
{id:"db_sl_rdl",name:"DB Single-Leg RDL",dw:13,sets:3,tr:8,rest:90,hw:true,unit:"kg (each)"},
{id:"db_stiff_leg",name:"DB Stiff-Leg Deadlift",dw:19,sets:3,tr:10,rest:90,hw:true,unit:"kg (each)"},
{id:"db_sumo_dl",name:"DB Sumo Deadlift",dw:25,sets:3,tr:10,rest:90,hw:true,unit:"kg"},
{id:"db_good_morning",name:"DB Good Morning",dw:13,sets:3,tr:10,rest:90,hw:true,unit:"kg"},
{id:"db_hip_thrust",name:"DB Hip Thrust",dw:20,sets:3,tr:12,rest:90,hw:true,unit:"kg"}]},
core:{pattern:"Core",exercises:[
{id:"dead_bug",name:"Dead Bug",dw:null,sets:3,tr:6,rest:60,hw:false,unit:"reps/side"},
{id:"plank",name:"Plank",dw:null,sets:3,tr:45,rest:60,hw:false,unit:"sec"},
{id:"bird_dog",name:"Bird Dog",dw:null,sets:3,tr:8,rest:60,hw:false,unit:"reps/side"},
{id:"ab_wheel",name:"Ab Wheel",dw:null,sets:3,tr:8,rest:60,hw:false,unit:"reps"},
{id:"farmer_carry",name:"Farmer's Carry",dw:20,sets:3,tr:30,rest:60,hw:true,unit:"sec, kg (each)"},
{id:"suitcase_carry",name:"Suitcase Carry",dw:17.5,sets:3,tr:30,rest:60,hw:true,unit:"sec, kg"}]}},
upper:{push:{pattern:"Push",exercises:[
{id:"db_bench",name:"DB Bench Press",dw:22,sets:3,tr:10,rest:90,hw:true,unit:"kg (each)"},
{id:"db_incline",name:"DB Incline Press",dw:19,sets:3,tr:10,rest:90,hw:true,unit:"kg (each)"},
{id:"db_floor_press",name:"DB Floor Press",dw:20.5,sets:3,tr:10,rest:90,hw:true,unit:"kg (each)"},
{id:"db_close_grip",name:"DB Close-Grip Press",dw:17.5,sets:3,tr:10,rest:90,hw:true,unit:"kg (each)"},
{id:"pushup_standard",name:"Push-Up (Standard)",dw:null,sets:3,tr:10,rest:60,hw:false,unit:"reps"},
{id:"pushup_incline",name:"Push-Up (Incline)",dw:null,sets:3,tr:12,rest:60,hw:false,unit:"reps"}]},
pull:{pattern:"Pull",exercises:[
{id:"bench_row",name:"Bench-Supported Row",dw:19,sets:3,tr:10,rest:90,hw:true,unit:"kg"},
{id:"db_bent_row",name:"DB Bent-Over Row",dw:19,sets:3,tr:10,rest:90,hw:true,unit:"kg (each)"},
{id:"db_single_row",name:"DB Single-Arm Row",dw:19,sets:3,tr:10,rest:90,hw:true,unit:"kg"},
{id:"db_seal_row",name:"DB Seal Row",dw:17.5,sets:3,tr:10,rest:90,hw:true,unit:"kg (each)"},
{id:"db_reverse_fly",name:"DB Reverse Fly",dw:8.5,sets:3,tr:12,rest:60,hw:true,unit:"kg (each)"}]},
vert_push:{pattern:"Vertical Push",exercises:[
{id:"shoulder_press",name:"Seated Shoulder Press",dw:20.5,sets:3,tr:10,rest:90,hw:true,unit:"kg (each)"},
{id:"db_standing_press",name:"DB Standing Press",dw:17.5,sets:3,tr:10,rest:90,hw:true,unit:"kg (each)"},
{id:"db_arnold",name:"DB Arnold Press",dw:16,sets:3,tr:10,rest:90,hw:true,unit:"kg (each)"},
{id:"db_z_press",name:"DB Z-Press",dw:13,sets:3,tr:10,rest:90,hw:true,unit:"kg (each)"},
{id:"db_lateral_raise",name:"DB Lateral Raise",dw:8.5,sets:3,tr:12,rest:60,hw:true,unit:"kg (each)"}]}}};
const SM={1:{l:"Easy",c:"#22c55e"},2:{l:"Hard",c:"#eab308"},3:{l:"Failed",c:"#ef4444"}};
const EC={1:"#ef4444",2:"#f97316",3:"#eab308",4:"#22c55e",5:"#10b981"};

function findEx(id){for(const t of Object.values(LIB))for(const s of Object.values(t)){const f=s.exercises.find(e=>e.id===id);if(f)return{...f,pattern:s.pattern}}return null}
function slotFor(id,type){const lib=LIB[type];for(const[k,s]of Object.entries(lib))if(s.exercises.find(e=>e.id===id))return k;return null}

let S={sessions:[],view:"home",aid:null,showModal:false,nType:"lower",nDate:td(),nSel:{},cdel:null,pType:"lower"};
function td(){return new Date().toISOString().split("T")[0]}
function gid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5)}
function fd(d){return new Date(d+"T00:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"})}
function load(){try{const d=localStorage.getItem(SK);if(d)S.sessions=JSON.parse(d)}catch(e){}}
function save(){try{localStorage.setItem(SK,JSON.stringify(S.sessions))}catch(e){}}
function gas(){return S.sessions.find(s=>s.id===S.aid)}

function defSel(type){const lib=LIB[type],sel={},last=S.sessions.filter(s=>s.type===type).sort((a,b)=>b.date.localeCompare(a.date))[0];
for(const[k,slot]of Object.entries(lib)){if(last){const le=last.exercises.find(ex=>slotFor(ex.id,type)===k);if(le){sel[k]=le.id;continue}}sel[k]=slot.exercises[0].id}return sel}

function mkSession(type,date,sel){const lib=LIB[type],last=S.sessions.filter(s=>s.type===type).sort((a,b)=>b.date.localeCompare(a.date))[0];
const exs=Object.entries(lib).map(([k,slot])=>{const eid=sel[k],meta=slot.exercises.find(e=>e.id===eid),prev=last?.exercises.find(e=>e.id===eid);
return{id:meta.id,slot:k,weight:prev?prev.weight:meta.dw,sets:Array.from({length:meta.sets},()=>({reps:null})),score:null,variation:""}});
return{id:gid(),type,date,exercises:exs,wakeEnergy:null,workoutDuration:null,notes:""}}

function prevFor(session,eid){const older=S.sessions.filter(s=>s.type===session.type&&s.date<session.date).sort((a,b)=>b.date.localeCompare(a.date));
for(const s of older){const f=s.exercises.find(e=>e.id===eid);if(f)return f}return null}

function cycleW(ei,dir){const s=gas(),ex=s.exercises[ei],m=findEx(ex.id);if(!m||!m.hw)return;
const ci=DBW.indexOf(ex.weight);let ni=ci+dir;if(ni<0)ni=0;if(ni>=DBW.length)ni=DBW.length-1;ex.weight=DBW[ni];save();R()}

function R(){const app=document.getElementById("app");let h="";
if(S.view==="home")h=rHome();else if(S.view==="session")h=rSession();else if(S.view==="progress")h=rProgress();
if(S.showModal)h+=rModal();app.innerHTML=h}

function rHome(){const sorted=[...S.sessions].sort((a,b)=>b.date.localeCompare(a.date)),lo=sorted.filter(s=>s.type==="lower"),up=sorted.filter(s=>s.type==="upper");
let h=`<header class="header"><div class="header-left"></div><h1>Solo Tracker</h1><div class="header-right"><button class="history-btn" onclick="goP()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/></svg></button></div></header><div class="content">
<div class="stats-row"><div class="stat-card"><span class="stat-value">${sorted.length}</span><span class="stat-label">Total</span></div><div class="stat-card"><span class="stat-value">${lo.length}</span><span class="stat-label">Lower</span></div><div class="stat-card"><span class="stat-value">${up.length}</span><span class="stat-label">Upper</span></div></div>`;
const ll=lo[0],lu=up[0];if(ll||lu){h+=`<div class="section"><h3 class="section-title">Last Sessions</h3>`;if(ll)h+=rLast(ll);if(lu)h+=rLast(lu);h+=`</div>`}
h+=`<button class="pbtn" onclick="oModal()">+ New Session</button>`;
if(sorted.length>0){h+=`<div class="section"><h3 class="section-title">All Sessions</h3>`;sorted.forEach(s=>{
const sc=s.exercises.map(ex=>ex.score?`<span class="mscore" style="color:${SM[ex.score].c}">${ex.score}</span>`:`<span class="mscore-e">-</span>`).join("");
const dl=S.cdel===s.id?`<div class="cfw"><button class="cfy" onclick="delS('${s.id}')">Delete</button><button class="cfn" onclick="cDel()">Cancel</button></div>`:`<button class="del-btn" onclick="cfDel('${s.id}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>`;
h+=`<div class="srow"><div class="srow-l" onclick="oS('${s.id}')"><span class="tdot ${s.type}"></span><div><span class="srow-date">${fd(s.date)}</span><span class="srow-type">${s.type==="lower"?"Lower Body":"Upper Body"}</span></div></div><div class="srow-r">${sc}${dl}</div></div>`});h+=`</div>`}
h+=`<div class="section"><button class="sbtn" onclick="oModal()">Log a Past Session</button></div><div class="ver">v${V}</div></div>`;return h}

function rLast(s){const exl=s.exercises.map(ex=>{const m=findEx(ex.id);const sc=ex.score?` <span class="sc${ex.score}">[${ex.score}]</span>`:"";return`<span class="mini-ex">${m?.name||ex.id}: ${ex.weight?ex.weight+"kg":"BW"}${sc}</span>`}).join("");
return`<div class="last-card" onclick="oS('${s.id}')"><div class="last-hdr"><span class="tbadge ${s.type}">${s.type==="lower"?"Lower Body":"Upper Body"}</span><span class="last-date">${fd(s.date)}</span></div><div>${exl}</div></div>`}

function rModal(){const type=S.nType,lib=LIB[type],sel=S.nSel;let slots="";
for(const[k,slot]of Object.entries(lib)){const opts=slot.exercises.map(ex=>{const isSel=sel[k]===ex.id;const det=ex.hw?`${ex.sets}x${ex.tr} | ${ex.unit}`:`${ex.sets}x${ex.tr} ${ex.unit}`;
return`<div class="exopt${isSel?" sel":""}" onclick="selEx('${k}','${ex.id}')"><div><div class="exopt-n">${ex.name}</div><div class="exopt-d">${det}</div></div><div class="exopt-chk">${isSel?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>':""}</div></div>`}).join("");
slots+=`<div class="slot-sec"><div class="slot-lbl"><span class="slot-pat">${slot.pattern}</span> slot</div>${opts}</div>`}
return`<div class="overlay" onclick="cModal()"><div class="modal" onclick="event.stopPropagation()"><h3 class="modal-title">New Session</h3>
<div class="fg"><label class="fl">Workout Type</label><div class="trow"><button class="tbtn${type==="lower"?" active":""}" onclick="sNT('lower')"><span class="tlbl">Lower Body</span></button><button class="tbtn${type==="upper"?" active":""}" onclick="sNT('upper')"><span class="tlbl">Upper Body</span></button></div></div>
<div class="fg"><label class="fl">Date</label><input type="date" class="dinput" value="${S.nDate}" max="${td()}" onchange="S.nDate=this.value"></div>
<div class="fg"><label class="fl">Exercises</label>${slots}</div>
<button class="pbtn" onclick="startS()">Start Session</button></div></div>`}

function rSession(){const s=gas();if(!s)return"";const bg=s.type==="lower"?"#9a3412":"#1e3a5f";
let h=`<header class="header"><div class="header-left"><button class="back-btn" onclick="goH()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button></div><h1>Solo Tracker</h1><div class="header-right"></div></header>
<div class="content"><div class="shdr"><span class="tbadge-lg" style="background:${bg}">${s.type==="lower"?"Lower Body":"Upper Body"}</span><span class="sdate">${fd(s.date)}</span></div>
<div class="mrow"><div class="mcard"><span class="mlbl">Wake Energy</span><div class="erow">${[1,2,3,4,5].map(n=>`<button class="ebtn${s.wakeEnergy===n?" active":""}" style="${s.wakeEnergy===n?`background:${EC[n]};color:#000`:""}" onclick="sE(${n})">${n}</button>`).join("")}</div></div>
<div class="mcard"><span class="mlbl">Duration (min)</span><input type="number" inputmode="numeric" class="durin" value="${s.workoutDuration||""}" placeholder="--" onchange="sD(this.value)"></div></div>`;

s.exercises.forEach((ex,ei)=>{const m=findEx(ex.id);if(!m)return;const pe=prevFor(s,ex.id);const lib=LIB[s.type];const pat=Object.values(lib).find(sl=>sl.exercises.find(e=>e.id===ex.id))?.pattern||"";
let wh="";if(m.hw){let dh="";if(pe&&pe.weight!==ex.weight){const d=ex.weight-pe.weight;dh=`<span class="wdelta" style="color:${d>0?"#22c55e":"#ef4444"}">${d>0?"+":""}${d.toFixed(1)}</span>`}
wh=`<div class="wrow"><button class="wbtn" onclick="cycleW(${ei},-1)">-</button><div class="wdisp"><span class="wval">${ex.weight}</span><span class="wunit">kg</span></div><button class="wbtn" onclick="cycleW(${ei},1)">+</button>${dh}</div>`}
const sh=ex.sets.map((st,si)=>{const pr=pe?.sets[si]?.reps;const prh=pr!=null?`<span class="prev-r">prev: ${pr}</span>`:"";const emp=st.reps===null;
return`<div class="set-item"><span class="set-lbl">S${si+1}</span><input type="number" inputmode="numeric" class="repin${emp?" ph":""}" value="${emp?"":st.reps}" placeholder="${m.tr}" onchange="sR(${ei},${si},this.value)">${prh}</div>`}).join("");
const scb=[1,2,3].map(sc=>`<button class="scbtn s${sc}${ex.score===sc?" active":""}" onclick="sSc(${ei},${sc})"><span class="scbtn-n">${sc}</span><span class="scbtn-l">${SM[sc].l}</span></button>`).join("");
h+=`<div class="ecard"><div class="ehdr"><h3 class="ename">${m.name}</h3><span class="eslot">${pat}</span><span class="emeta">${m.sets}x${m.tr} ${m.unit} | ${m.rest}s rest</span></div>${wh}<div class="sets-row">${sh}</div><div class="scrow"><span class="sclbl">Score</span><div class="scbtns">${scb}</div></div><input type="text" class="varin" value="${ex.variation||""}" placeholder="Variation notes..." onchange="sV(${ei},this.value)"></div>`});

h+=`<div class="nsec"><label class="nlbl">Session Notes</label><textarea class="nin" placeholder="How did the session feel overall?" onchange="sN(this.value)" rows="3">${s.notes||""}</textarea></div></div>`;return h}

function rProgress(){const type=S.pType,fil=S.sessions.filter(s=>s.type===type).sort((a,b)=>a.date.localeCompare(b.date));
let h=`<header class="header"><div class="header-left"><button class="back-btn" onclick="goH()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button></div><h1>Solo Tracker</h1><div class="header-right"></div></header>
<div class="content"><div class="trow"><button class="tbtn${type==="lower"?" active":""}" onclick="sPT('lower')"><span class="tlbl">Lower Body</span></button><button class="tbtn${type==="upper"?" active":""}" onclick="sPT('upper')"><span class="tlbl">Upper Body</span></button></div>`;
if(!fil.length){h+=`<div class="empty"><p>No sessions logged yet.</p></div>`}else{fil.forEach((s,idx)=>{const prev=idx>0?fil[idx-1]:null;
const et=s.wakeEnergy?`<span class="petag" style="color:${EC[s.wakeEnergy]}">E:${s.wakeEnergy}</span>`:"";const dt=s.workoutDuration?`<span class="pdtag">${s.workoutDuration}m</span>`:"";
const exh=s.exercises.map(ex=>{const m=findEx(ex.id);if(!m)return"";const pe=prev?.exercises.find(e=>e.id===ex.id);const rps=ex.sets.map(s=>s.reps??"-").join("/");
let wh="";if(m.hw){let dl="";if(pe&&ex.weight!==pe.weight){const d=ex.weight-pe.weight;dl=`<span class="pdelta" style="color:${d>0?"#22c55e":"#ef4444"}">${d>0?"+":""}${d.toFixed(1)}</span>`}wh=`<span class="pexw">${ex.weight}kg${dl}</span>`}
const sch=ex.score?`<span class="pexsc" style="color:${SM[ex.score].c}">${SM[ex.score].l}</span>`:"";const vh=ex.variation?`<span class="pexv">${ex.variation}</span>`:"";
return`<div class="pexr"><div style="display:flex;gap:8px;align-items:center"><span class="pexn">${m.name}</span><span class="pexs-tag">${m.pattern}</span></div><div class="pexd">${wh}<span class="pexrp">${rps}</span>${sch}</div>${vh}</div>`}).join("");
const nh=s.notes?`<p class="pnotes">${s.notes}</p>`:"";
h+=`<div class="pcard"><div class="phdr"><span class="pwk">Week ${idx+1}</span><span class="pdt">${fd(s.date)}</span>${et}${dt}</div><div class="pexs">${exh}</div>${nh}</div>`})}
h+=`</div>`;return h}

function goH(){S.view="home";S.aid=null;R()}
function goP(){S.view="progress";R()}
function sPT(t){S.pType=t;R()}
function oModal(){S.showModal=true;S.nType="lower";S.nDate=td();S.nSel=defSel("lower");R()}
function cModal(){S.showModal=false;R()}
function sNT(t){S.nType=t;S.nSel=defSel(t);R()}
function selEx(k,id){S.nSel[k]=id;R()}
function startS(){const ex=S.sessions.find(s=>s.date===S.nDate&&s.type===S.nType);
if(ex){S.aid=ex.id;S.view="session";S.showModal=false;R();return}
const s=mkSession(S.nType,S.nDate,S.nSel);S.sessions.push(s);S.sessions.sort((a,b)=>b.date.localeCompare(a.date));save();S.aid=s.id;S.view="session";S.showModal=false;R()}
function oS(id){S.aid=id;S.view="session";R()}
function sE(n){const s=gas();s.wakeEnergy=s.wakeEnergy===n?null:n;save();R()}
function sD(v){const s=gas();s.workoutDuration=v?parseInt(v):null;save()}
function sR(ei,si,v){const s=gas();s.exercises[ei].sets[si].reps=v===""?null:parseInt(v)||0;save();R()}
function sSc(ei,sc){const s=gas();s.exercises[ei].score=s.exercises[ei].score===sc?null:sc;save();R()}
function sV(ei,v){const s=gas();s.exercises[ei].variation=v;save()}
function sN(v){const s=gas();s.notes=v;save()}
function cfDel(id){S.cdel=id;R()}
function cDel(){S.cdel=null;R()}
function delS(id){S.sessions=S.sessions.filter(s=>s.id!==id);save();S.cdel=null;if(S.aid===id){S.view="home";S.aid=null}R()}

load();R();
</script>
</body>
</html>
